<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FF5400">
<title>Chispas del taller</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --naranja:#FF5400;--naranja-d:#CC4300;--naranja-l:#FFE8DC;
    --violeta:#8338EC;--violeta-l:#EFE0FF;
    --azul:#3A86FF;--azul-l:#DCEEFF;
    --amarillo:#FFBE0B;--amarillo-d:#B38000;--amarillo-l:#FFF6D0;
    --negro:#0A0A0A;--fondo:#FFFBF0;--gris:#F0EBE0;--gris2:#D9D2C5;
    --verde:#00A86B;--verde-l:#D0F5E8;
  }
  body{background:var(--fondo);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
  .wrap{max-width:600px;margin:0 auto;padding:1.25rem 1rem 3rem;}

  .header{display:flex;align-items:center;gap:14px;background:var(--naranja);border-radius:18px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;}
  .header-icon{font-size:34px;flex-shrink:0;}
  .header h1{font-size:19px;font-weight:500;color:#fff;line-height:1.3;}
  .header p{font-size:12px;color:rgba(255,255,255,.75);margin-top:3px;}

  .prog-wrap{margin-bottom:1.5rem;}
  .prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .prog-label{font-size:12px;color:rgba(10,10,10,.4);}
  .prog-num{font-size:12px;font-weight:500;color:var(--naranja);}
  .prog-bar{height:7px;background:var(--gris);border-radius:4px;overflow:hidden;}
  .prog-fill{height:100%;background:var(--naranja);border-radius:4px;transition:width .5s;}

  .semanas{display:flex;flex-direction:column;gap:1rem;}

  .semana{border-radius:16px;overflow:hidden;border:2px solid;}
  .semana.s1{border-color:var(--naranja);}
  .semana.s2{border-color:var(--amarillo-d);}
  .semana.s3{border-color:var(--azul);}
  .semana.s4{border-color:var(--violeta);}

  .s-head{padding:13px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-user-select:none;}
  .s1 .s-head{background:var(--naranja-l);}
  .s2 .s-head{background:var(--amarillo-l);}
  .s3 .s-head{background:var(--azul-l);}
  .s4 .s-head{background:var(--violeta-l);}

  .s-icon{font-size:22px;flex-shrink:0;}
  .s-info{flex:1;min-width:0;}
  .s-num{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;opacity:.5;color:var(--negro);}
  .s-titulo{font-size:13px;font-weight:500;color:var(--negro);margin-top:1px;}
  .s-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .enc-badge{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;padding:3px 9px;border-radius:20px;}
  .s1 .enc-badge{background:var(--naranja);color:#fff;}
  .s2 .enc-badge{background:var(--amarillo);color:var(--amarillo-d);}
  .s3 .enc-badge{background:var(--azul);color:#fff;}
  .s4 .enc-badge{background:var(--violeta);color:#fff;}
  .dots{display:flex;gap:4px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--gris2);}
  .dot.abierta{background:var(--naranja);}
  .dot.leida{background:var(--verde);}
  .s2 .dot.abierta{background:var(--amarillo-d);}
  .s3 .dot.abierta{background:var(--azul);}
  .s4 .dot.abierta{background:var(--violeta);}
  .chevron{font-size:14px;color:rgba(10,10,10,.35);transition:transform .2s;margin-left:2px;}
  .semana.open .chevron{transform:rotate(180deg);}

  .s-body{display:none;background:#fff;padding:14px;}
  .semana.open .s-body{display:block;}

  .sobre{border-radius:12px;overflow:hidden;border:1.5px solid var(--gris2);margin-bottom:9px;}
  .sobre-front{background:var(--gris);padding:13px 15px;display:flex;align-items:center;gap:10px;}
  .sobre-emoji{font-size:20px;flex-shrink:0;}
  .sobre-hint{font-size:12px;color:rgba(10,10,10,.4);font-style:italic;flex:1;line-height:1.4;}
  .btn-abrir{flex-shrink:0;padding:9px 15px;border-radius:22px;border:none;font-size:12px;font-weight:500;cursor:pointer;color:#fff;line-height:1;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  .s1 .btn-abrir{background:var(--naranja);}
  .s2 .btn-abrir{background:var(--amarillo-d);}
  .s3 .btn-abrir{background:var(--azul);}
  .s4 .btn-abrir{background:var(--violeta);}

  .sobre-back{display:none;padding:16px;}
  .sobre.abierta .sobre-front{display:none;}
  .sobre.abierta .sobre-back{display:block;}
  .sobre.leida .sobre-back{background:var(--verde-l);}

  .chispa-tag{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--gris2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .sobre.leida .chispa-tag{color:var(--verde);}
  .chispa-texto{font-size:14px;color:var(--negro);line-height:1.75;font-style:italic;margin-bottom:14px;}
  .sobre.leida .chispa-texto{color:#1a5c3a;}

  .btn-marcar{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:22px;border:1.5px solid var(--gris2);background:transparent;font-size:12px;color:rgba(10,10,10,.45);cursor:pointer;touch-action:manipulation;}
  .sobre.leida .btn-marcar{border-color:var(--verde);color:var(--verde);}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-icon">💫</div>
    <div>
      <h1>Chispas de la semana</h1>
      <p>Abrí la que necesitás, cuando la necesitás</p>
    </div>
  </div>

  <div class="prog-wrap">
    <div class="prog-top">
      <span class="prog-label">✨ Chispas recibidas</span>
      <span class="prog-num" id="progNum">0 de 8</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <div class="semanas" id="root"></div>
</div>

<script>
var data=[
  {id:1,cls:'s1',icon:'🌊',titulo:'Volver a habitar el cuerpo',enc:'Encuentro 1',
    chispas:[
      {txt:'Esta semana todas estamos aprendiendo a escuchar. Hoy, un momento tuyo: cerrá los ojos, respirá, y preguntate ¿cómo estoy? Sin filtro. Solo vos.',tag:'🌊 Chispa 1'},
      {txt:'Tu cuerpo sabe más de lo que creés. Hoy prestale atención a algo chiquito: un hombro tenso, un suspiro, una sonrisa. Eso también es reconectarse.',tag:'🌊 Chispa 2'}
    ]},
  {id:2,cls:'s2',icon:'🪶',titulo:'Abrazo mi historia corporal',enc:'Encuentro 2',
    chispas:[
      {txt:'Esta semana estamos aprendiendo a agradecer lo que fue. ¿Qué le dirías hoy a tu cuerpo de antes? Una sola palabra alcanza.',tag:'🪶 Chispa 1'},
      {txt:'Soltar no es fácil, pero no estás sola en esto. Hoy, una respiración profunda y una frase: "Gracias por traerme hasta acá." Eso es todo.',tag:'🪶 Chispa 2'}
    ]},
  {id:3,cls:'s3',icon:'🌿',titulo:'El cuerpo que soy hoy',enc:'Encuentro 3',
    chispas:[
      {txt:'Esta semana estamos mirando el cuerpo que somos hoy. ¿Qué parte tuya está pidiendo un poco de atención? Dásela, sin juzgar.',tag:'🌿 Chispa 1'},
      {txt:'Cambiar la mirada es el primer paso. Hoy elegí una parte de vos y mirala con curiosidad, no con crítica. El grupo está haciendo lo mismo.',tag:'🌿 Chispa 2'}
    ]},
  {id:4,cls:'s4',icon:'✨',titulo:'Mi nuevo pacto conmigo',enc:'Encuentro 4',
    chispas:[
      {txt:'Llegamos juntas hasta acá. Pausá un momento y preguntate: ¿qué me llevo de estas semanas? Una palabra, una imagen, una sensación. Eso es tuyo para siempre.',tag:'✨ Chispa 1'},
      {txt:'¿Qué querés seguir cultivando? Elegí algo chiquito, tuyo, posible. Ese es tu pacto. Y nosotras estamos para acompañarlo.',tag:'✨ Chispa 2'}
    ]}
];

var KEY='chispas_v4';
var st;
try{st=JSON.parse(localStorage.getItem(KEY));}catch(e){}
if(!st)st={ab:{},le:{},open:1};
function save(){try{localStorage.setItem(KEY,JSON.stringify(st));}catch(e){}}
function isAb(s,c){return st.ab[s]&&st.ab[s].indexOf(c)>=0;}
function isLe(s,c){return st.le[s]&&st.le[s].indexOf(c)>=0;}

function abrir(sid,cid){
  if(!st.ab[sid])st.ab[sid]=[];
  if(st.ab[sid].indexOf(cid)<0)st.ab[sid].push(cid);
  save();render();
}
function marcar(sid,cid){
  if(!st.le[sid])st.le[sid]=[];
  var a=st.le[sid],i=a.indexOf(cid);
  if(i>=0)a.splice(i,1);else a.push(cid);
  save();render();
}
function toggle(sid){
  st.open=st.open===sid?null:sid;
  save();render();
}
function totalAb(){
  var t=0;
  Object.keys(st.ab).forEach(function(k){t+=st.ab[k].length;});
  return t;
}

function render(){
  var total=totalAb();
  document.getElementById('progNum').textContent=total+' de 8';
  document.getElementById('progFill').style.width=Math.round(total/8*100)+'%';

  var html='';
  data.forEach(function(s){
    var isOpen=st.open===s.id;
    var dotsh='';
    s.chispas.forEach(function(_,i){
      var le=isLe(s.id,i),ab=isAb(s.id,i);
      dotsh+='<div class="dot '+(le?'leida':ab?'abierta':'')+'"></div>';
    });
    var sobres='';
    s.chispas.forEach(function(c,i){
      var ab=isAb(s.id,i),le=isLe(s.id,i);
      sobres+='<div class="sobre '+(ab?'abierta ':'')+' '+(le?'leida':'')+'" id="sob-'+s.id+'-'+i+'">'+
        '<div class="sobre-front">'+
          '<div class="sobre-emoji">💌</div>'+
          '<div class="sobre-hint">'+c.tag+' — tocá cuando la necesitás</div>'+
          '<button class="btn-abrir" id="btn-'+s.id+'-'+i+'">Necesito esta chispa 🔥</button>'+
        '</div>'+
        '<div class="sobre-back">'+
          '<div class="chispa-tag">'+(le?'✓ ':'')+c.tag+'</div>'+
          '<div class="chispa-texto">'+c.txt+'</div>'+
          '<button class="btn-marcar" id="mrk-'+s.id+'-'+i+'">'+(le?'✓ Recibida 🧡':'Marcar como recibida')+'</button>'+
        '</div>'+
      '</div>';
    });
    html+='<div class="semana '+s.cls+' '+(isOpen?'open':'')+'" id="sem-'+s.id+'">'+
      '<div class="s-head" id="hd-'+s.id+'">'+
        '<div class="s-icon">'+s.icon+'</div>'+
        '<div class="s-info">'+
          '<div class="s-num">Semana '+s.id+'</div>'+
          '<div class="s-titulo">'+s.titulo+'</div>'+
        '</div>'+
        '<div class="s-right">'+
          '<span class="enc-badge">'+s.enc+'</span>'+
          '<div class="dots">'+dotsh+'</div>'+
          '<div class="chevron">▾</div>'+
        '</div>'+
      '</div>'+
      '<div class="s-body">'+sobres+'</div>'+
    '</div>';
  });
  document.getElementById('root').innerHTML=html;

  data.forEach(function(s){
    document.getElementById('hd-'+s.id).addEventListener('click',function(){toggle(s.id);});
    s.chispas.forEach(function(_,i){
      var btn=document.getElementById('btn-'+s.id+'-'+i);
      if(btn)btn.addEventListener('click',function(e){e.stopPropagation();abrir(s.id,i);});
      var mrk=document.getElementById('mrk-'+s.id+'-'+i);
      if(mrk)mrk.addEventListener('click',function(e){e.stopPropagation();marcar(s.id,i);});
    });
  });
}
render();
</script>
</body>
</html>
