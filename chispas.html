<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FF5400">
<title>Chispas del taller</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --naranja:#FF5400;--naranja-light:#FFE8DC;
    --amarillo:#FFBE0B;--amarillo-light:#FFF6D0;--amarillo-dark:#B38000;
    --violeta:#8338EC;--violeta-light:#EFE0FF;
    --azul:#3A86FF;--azul-light:#DCEEFF;
    --negro:#0A0A0A;--fondo:#FFFBF0;--gris:#F0EBE0;--gris2:#D9D2C5;
    --verde:#00A86B;--verde-light:#D0F5E8;
  }
  body{background:var(--fondo);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
  .wrap{max-width:600px;margin:0 auto;padding:1.5rem 1rem 3rem;}
  .header{text-align:center;margin-bottom:2rem;padding:1.5rem;background:var(--negro);border-radius:16px;}
  .header h1{font-size:20px;font-weight:500;color:#fff;}
  .header p{font-size:13px;color:var(--amarillo);margin-top:4px;}
  .prog-wrap{margin-bottom:1.5rem;}
  .prog-top{display:flex;justify-content:space-between;font-size:12px;color:rgba(10,10,10,.45);margin-bottom:6px;}
  .prog-bar{height:6px;background:var(--gris);border-radius:3px;overflow:hidden;}
  .prog-fill{height:100%;background:var(--naranja);border-radius:3px;transition:width .4s;}
  .semanas{display:flex;flex-direction:column;gap:1.25rem;}

  .semana{border-radius:16px;overflow:hidden;border:2px solid transparent;}
  .semana.s1{border-color:var(--naranja);}
  .semana.s2{border-color:var(--amarillo-dark);}
  .semana.s3{border-color:var(--azul);}
  .semana.s4{border-color:var(--violeta);}

  .s-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;-webkit-user-select:none;}
  .s1 .s-head{background:var(--naranja-light);}
  .s2 .s-head{background:var(--amarillo-light);}
  .s3 .s-head{background:var(--azul-light);}
  .s4 .s-head{background:var(--violeta-light);}

  .s-meta{display:flex;align-items:center;gap:10px;pointer-events:none;}
  .s-icon{font-size:22px;}
  .s-num{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;opacity:.55;color:var(--negro);}
  .s-titulo{font-size:14px;font-weight:500;color:var(--negro);margin-top:1px;}
  .s-right{display:flex;align-items:center;gap:6px;pointer-events:none;}
  .dots{display:flex;gap:4px;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--gris2);}
  .dot.abierta{background:var(--naranja);}
  .dot.leida{background:var(--verde);}
  .chevron{font-size:14px;color:var(--negro);opacity:.4;transition:transform .2s;margin-left:4px;}
  .semana.open .chevron{transform:rotate(180deg);}

  .s-body{display:none;background:#fff;padding:16px;}
  .semana.open .s-body{display:block;}

  .etag{display:inline-block;font-size:10px;padding:3px 10px;border-radius:20px;margin-bottom:14px;font-weight:500;}
  .s1 .etag{background:var(--naranja);color:#fff;}
  .s2 .etag{background:var(--amarillo);color:var(--amarillo-dark);}
  .s3 .etag{background:var(--azul);color:#fff;}
  .s4 .etag{background:var(--violeta);color:#fff;}

  .sobre{border-radius:12px;overflow:hidden;border:1.5px solid var(--gris2);margin-bottom:10px;}

  .sobre-front{padding:14px 16px;background:var(--gris);display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .sobre-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
  .sobre-emoji{font-size:20px;flex-shrink:0;}
  .sobre-hint{font-size:13px;color:rgba(10,10,10,.4);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .btn-abrir{flex-shrink:0;padding:9px 16px;border-radius:20px;border:none;font-size:13px;font-weight:500;cursor:pointer;color:#fff;touch-action:manipulation;}
  .s1 .btn-abrir{background:var(--naranja);}
  .s2 .btn-abrir{background:var(--amarillo-dark);}
  .s3 .btn-abrir{background:var(--azul);}
  .s4 .btn-abrir{background:var(--violeta);}

  .sobre-back{display:none;padding:16px;background:#fff;}
  .sobre.abierta .sobre-front{display:none;}
  .sobre.abierta .sobre-back{display:block;}
  .sobre.leida .sobre-back{background:var(--verde-light);}

  .c-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--gris2);margin-bottom:8px;}
  .c-texto{font-size:14px;color:var(--negro);line-height:1.7;font-style:italic;margin-bottom:14px;}
  .sobre.leida .c-texto{color:#1a5c3a;}

  .btn-marcar{padding:8px 16px;border-radius:20px;border:1.5px solid var(--gris2);background:transparent;font-size:12px;color:rgba(10,10,10,.5);cursor:pointer;touch-action:manipulation;}
  .sobre.leida .btn-marcar{border-color:var(--verde);color:var(--verde);}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Chispas de la semana</h1>
    <p>Abrí la que necesitás, cuando la necesitás</p>
  </div>
  <div class="prog-wrap">
    <div class="prog-top"><span>Chispas recibidas</span><span id="progNum">0 de 8</span></div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="semanas" id="root"></div>
</div>
<script>
var data=[
  {id:1,titulo:'Volver a habitar el cuerpo',icon:'🌊',cls:'s1',enc:'Encuentro 1',
    chispas:[
      'Esta semana todas estamos aprendiendo a escuchar. Hoy, un momento tuyo: cerrá los ojos, respirá, y preguntate ¿cómo estoy? Sin filtro. Solo vos.',
      'Tu cuerpo sabe más de lo que creés. Hoy prestale atención a algo chiquito: un hombro tenso, un suspiro, una sonrisa. Eso también es reconectarse.'
    ]},
  {id:2,titulo:'Abrazo mi historia corporal',icon:'🪶',cls:'s2',enc:'Encuentro 2',
    chispas:[
      'Esta semana estamos aprendiendo a agradecer lo que fue. ¿Qué le dirías hoy a tu cuerpo de antes? Una sola palabra alcanza.',
      'Soltar no es fácil, pero no estás sola en esto. Hoy, una respiración profunda y una frase: "Gracias por traerme hasta acá." Eso es todo.'
    ]},
  {id:3,titulo:'El cuerpo que soy hoy',icon:'🌿',cls:'s3',enc:'Encuentro 3',
    chispas:[
      'Esta semana estamos mirando el cuerpo que somos hoy. ¿Qué parte tuya está pidiendo un poco de atención? Dásela, sin juzgar.',
      'Cambiar la mirada es el primer paso. Hoy elegí una parte de vos y mirala con curiosidad, no con crítica. El grupo está haciendo lo mismo.'
    ]},
  {id:4,titulo:'Mi nuevo pacto conmigo',icon:'✨',cls:'s4',enc:'Encuentro 4',
    chispas:[
      'Llegamos juntas hasta acá. Pausá un momento y preguntate: ¿qué me llevo de estas semanas? Una palabra, una imagen, una sensación. Eso es tuyo para siempre.',
      '¿Qué querés seguir cultivando? Elegí algo chiquito, tuyo, posible. Ese es tu pacto. Y nosotras estamos para acompañarlo.'
    ]}
];

var KEY='chispas_v3';
var st;
try{st=JSON.parse(localStorage.getItem(KEY));}catch(e){}
if(!st)st={abiertas:{},leidas:{},open:1};
function save(){try{localStorage.setItem(KEY,JSON.stringify(st));}catch(e){}}

function isAb(s,c){return st.abiertas[s]&&st.abiertas[s].indexOf(c)>=0;}
function isLe(s,c){return st.leidas[s]&&st.leidas[s].indexOf(c)>=0;}

function abrir(sid,cid){
  if(!st.abiertas[sid])st.abiertas[sid]=[];
  if(st.abiertas[sid].indexOf(cid)<0)st.abiertas[sid].push(cid);
  save();render();
}
function marcar(sid,cid){
  if(!st.leidas[sid])st.leidas[sid]=[];
  var a=st.leidas[sid],i=a.indexOf(cid);
  if(i>=0)a.splice(i,1);else a.push(cid);
  save();render();
}
function toggle(sid){
  st.open=st.open===sid?null:sid;
  save();render();
}

function totalAb(){
  var t=0;
  Object.keys(st.abiertas).forEach(function(k){t+=st.abiertas[k].length;});
  return t;
}

function render(){
  var total=totalAb();
  document.getElementById('progNum').textContent=total+' de 8';
  document.getElementById('progFill').style.width=Math.round(total/8*100)+'%';

  var html='';
  data.forEach(function(s){
    var isOpen=st.open===s.id;
    var dotsh='';
    s.chispas.forEach(function(_,i){
      var le=isLe(s.id,i),ab=isAb(s.id,i);
      dotsh+='<div class="dot '+(le?'leida':ab?'abierta':'')+'"></div>';
    });
    var sobres='';
    s.chispas.forEach(function(txt,i){
      var ab=isAb(s.id,i),le=isLe(s.id,i);
      sobres+='<div class="sobre '+(ab?'abierta ':'')+' '+(le?'leida':'')+'" id="sobre-'+s.id+'-'+i+'">'+
        '<div class="sobre-front">'+
          '<div class="sobre-left"><span class="sobre-emoji">💌</span><span class="sobre-hint">Chispa '+(i+1)+' — tocá cuando la necesitás</span></div>'+
          '<button class="btn-abrir" id="btn-'+s.id+'-'+i+'">Necesito esta chispa</button>'+
        '</div>'+
        '<div class="sobre-back">'+
          '<div class="c-label">Chispa '+(i+1)+'</div>'+
          '<div class="c-texto">'+txt+'</div>'+
          '<button class="btn-marcar" id="mrk-'+s.id+'-'+i+'">'+(le?'✓ Recibida':'Marcar como recibida')+'</button>'+
        '</div>'+
      '</div>';
    });
    html+='<div class="semana '+s.cls+' '+(isOpen?'open':'')+'" id="sem-'+s.id+'">'+
      '<div class="s-head" id="head-'+s.id+'">'+
        '<div class="s-meta"><div class="s-icon">'+s.icon+'</div><div><div class="s-num">Semana '+s.id+'</div><div class="s-titulo">'+s.titulo+'</div></div></div>'+
        '<div class="s-right"><div class="dots">'+dotsh+'</div><div class="chevron">▾</div></div>'+
      '</div>'+
      '<div class="s-body"><span class="etag">'+s.enc+'</span>'+sobres+'</div>'+
    '</div>';
  });
  document.getElementById('root').innerHTML=html;

  // Eventos separados para evitar conflictos mobile
  data.forEach(function(s){
    document.getElementById('head-'+s.id).addEventListener('click',function(){toggle(s.id);});
    s.chispas.forEach(function(_,i){
      var btn=document.getElementById('btn-'+s.id+'-'+i);
      if(btn){
        btn.addEventListener('click',function(e){
          e.stopPropagation();
          abrir(s.id,i);
        });
      }
      var mrk=document.getElementById('mrk-'+s.id+'-'+i);
      if(mrk){
        mrk.addEventListener('click',function(e){
          e.stopPropagation();
          marcar(s.id,i);
        });
      }
    });
  });
}
render();
</script>
</body>
</html>
